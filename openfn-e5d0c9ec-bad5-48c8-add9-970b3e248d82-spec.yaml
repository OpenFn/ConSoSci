name: social-sciences
description: |
  Data integration workflows for WCS social sciences data. Used to transfer BNS & NRGT data from KoboToolbox forms to the WCS Programs MS SQL database.

collections:
  mydata:
    name: mydata
credentials:
  aisha@openfn.org-AK-Asana:
    name: AK Asana
    owner: aisha@openfn.org
  aleksa@openfn.org-Asana-API-Token---AK-WCS-Grievances:
    name: Asana API Token - AK WCS Grievances
    owner: aleksa@openfn.org
  aleksa@openfn.org-openfn-api-AK-PAT-social-sciences:
    name: openfn api-AK PAT-social sciences
    owner: aleksa@openfn.org
  ddetoeuf@wcs.org-Diane-GoogleSheet:
    name: Diane GoogleSheet
    owner: ddetoeuf@wcs.org
  ddetoeuf@wcs.org-OpenFn-Kobo-Toolbox---WCS-access:
    name: OpenFn Kobo Toolbox - WCS access
    owner: ddetoeuf@wcs.org
  ddetoeuf@wcs.org-WCS-Kobo-account:
    name: WCS Kobo account
    owner: ddetoeuf@wcs.org
  ddetoeuf@wcs.org-wcsprograms-db:
    name: wcsprograms db
    owner: ddetoeuf@wcs.org
  rediet@openfn.org-Rediet-Googlesheet:
